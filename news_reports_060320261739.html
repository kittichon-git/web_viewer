<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานข่าวมาใหม่ - 6 มีนาคม 2569</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            color: #000000;
        }

        .container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: fit-content;
            min-width: 100%;
            table-layout: fixed;
            background-color: #ffffff;
        }

        thead th {
            background-color: #f8f9fa;
            border: 1px solid #c0c0c0;
            color: #444;
            font-size: 12px;
            font-weight: normal;
            height: 25px;
            text-align: center;
            vertical-align: middle;
        }

        td {
            border: 1px solid #e2e2e2;
            padding: 0 10px;
            word-wrap: break-word;
            overflow: hidden;
            font-size: 13pt;
            line-height: normal;
        }

        tr td:first-child {
            background-color: #f8f9fa;
            color: #444;
            text-align: center;
            font-size: 12px;
            width: 45px !important;
            border: 1px solid #c0c0c0;
        }

        a {
            color: #1155cc;
            text-decoration: underline;
        }

        .sheet-cell {
            vertical-align: middle;
        }

        .header-row {
            background-color: #ff9900;
            color: white;
            font-weight: bold;
        }

        .date-group-row {
            background-color: #eeeeee;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <table>
            <colgroup>
                <col style="width: 45px;">
                <col style="width: 60px;">
                <col style="width: 800px;">
            </colgroup>
            <thead>
                <tr>
                    <th></th>
                    <th>A</th>
                    <th>B</th>
                </tr>
            </thead>
            <tbody>
                <!-- หัวข้อรายงาน -->
                <tr style="height: 100px;">
                    <td class="sheet-cell">1</td>
                    <td colspan="2" class="sheet-cell header-row"
                        style="text-align: left; font-size: 20pt; padding: 20px;">
                        ข่าวมาใหม่ ประจำวันที่ 6 มีนาคม 2569
                    </td>
                </tr>
                <tr style="height: 40px;">
                    <td class="sheet-cell">2</td>
                    <td class="sheet-cell" style="text-align: center; color: #ff9900; font-weight: bold;">ที่</td>
                    <td class="sheet-cell" style="text-align: left; color: #ff9900; font-weight: bold;">
                        รายละเอียดการประมูล (คลิกเพื่อดูไฟล์)</td>
                </tr>

                
                

                
            </tbody>
        </table>
    </div>
</body>

</html>
