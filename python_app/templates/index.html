<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Report Generator (Safe Mode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #1a73e8;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1.8rem;
        }

        .desc {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background: #1557b0;
        }

        #status {
            margin-top: 1.2rem;
            text-align: center;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
        }

        .success {
            color: #155724;
            background-color: #d4edda;
        }

        .error {
            color: #721c24;
            background-color: #f8d7da;
        }

        .loading {
            color: #0c5460;
            background-color: #d1ecf1;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>📰 Report Generator (Private)</h1>
        <p class="desc">สร้างรายงานโดยดึงข้อมูลผ่าน Apps Script (ไม่ต้องแชร์โฟลเดอร์เป็นสาธารณะ)</p>

        <div class="form-group">
            <label>WebApp URL (จาก Google Apps Script)</label>
            <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
        </div>

        <div class="form-group">
            <label>Secret Key (รหัสผ่านความปลอดภัย)</label>
            <input type="password" id="secretKey" value="AUCTION_SECRET_123">
        </div>

        <button onclick="generateReport()">สร้างรายงานใหม่ไปที่ d:\web viewer</button>
        <div id="status"></div>
    </div>

    <script>
        async function generateReport() {
            const scriptUrl = document.getElementById('scriptUrl').value;
            const secretKey = document.getElementById('secretKey').value;
            const status = document.getElementById('status');

            if (!scriptUrl || !secretKey) {
                status.className = 'error';
                status.innerText = '⚠️ กรุณากรอกข้อมูลให้ครบถ้วน';
                return;
            }

            status.className = 'loading';
            status.innerText = '⏳ กำลังดึงข้อมูลผ่าน Proxy... (อาจใช้เวลา 30-60 วินาที)';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        script_url: scriptUrl,
                        secret_key: secretKey
                    })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    status.className = 'success';
                    status.innerText = `✅ สร้างสำเร็จ! ไฟล์อยู่ที่: ${result.path}`;
                } else {
                    status.className = 'error';
                    status.innerText = `❌ ข้อผิดพลาด: ${result.message}`;
                }
            } catch (e) {
                status.className = 'error';
                status.innerText = '❌ เกิดข้อผิดพลาดในการเชื่อมต่อกับ Python Server';
            }
        }
    </script>
</body>

</html>
