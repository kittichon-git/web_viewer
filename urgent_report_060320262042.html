        .highlight-urgent { background-color: #fce4ec; }
        tr.urgent-row td:first-child { text-align: center; width: 45px !important; border: none; background-color: white; }
        
        #pdfViewerWrapper { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 99999; }
        #pdfFrame { width: 100%; height: 100%; border: none; }
        .back-btn { position: fixed; top: 15px; left: 15px; padding: 10px 20px; background: #FB8C00; color: white; border-radius: 30px; cursor: pointer; z-index: 100001; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); border: 2px solid white; }

    </style>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 's' || e.key === 'p' || e.key === 'u' || e.key === 'i')) {
                e.preventDefault(); return false;
            }
        });
        window.onpopstate = function (event) { closePdfViewer(); };
        function openSecureLink(obf) {
            try {
                const rawUrl = atob(obf);
                let previewUrl = rawUrl;
                if (rawUrl.includes('/view')) { previewUrl = rawUrl.replace('/view', '/preview'); }
                const wrapper = document.getElementById('pdfViewerWrapper');
                const iframe = document.getElementById('pdfFrame');
                iframe.src = previewUrl;
                wrapper.style.display = 'block';
                document.body.style.overflow = 'hidden';
                history.pushState({ viewing: true }, "");
            } catch (e) { console.error("Invalid link"); }
        }
        function closePdfViewer() {
            const wrapper = document.getElementById('pdfViewerWrapper');
            const iframe = document.getElementById('pdfFrame');
            wrapper.style.display = 'none';
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }
        function goBackManually() { window.history.back(); }
    </script>
