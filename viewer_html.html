<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            color: #000000;
        }

        .container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: fit-content;
            min-width: 100%;
            table-layout: fixed;
            background-color: #ffffff;
        }

        /* จำลอง Row/Column Headers แบบ Google Sheet เป๊ะๆ */
        thead th {
            background-color: #f8f9fa;
            border: 1px solid #c0c0c0;
            color: #444;
            font-size: 12px;
            font-weight: normal;
            height: 25px;
            text-align: center;
            vertical-align: middle;
        }

        td {
            border: 1px solid #e2e2e2;
            padding: 0 10px;
            word-wrap: break-word;
            overflow: hidden;
            font-size: 13pt;
            line-height: normal;
        }

        /* คอลัมน์ตัวเลขแถวด้านซ้าย */
        tr td:first-child {
            background-color: #f8f9fa;
            color: #444;
            text-align: center;
            font-size: 12px;
            width: 45px !important;
            border: 1px solid #c0c0c0;
        }

        a {
            color: #1155cc;
            text-decoration: underline;
        }

        .sheet-cell {
            vertical-align: middle;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
    <script>
        // ป้องกันการคลิกขวา
        document.addEventListener('contextmenu', event => event.preventDefault());

        // ป้องกันปุ่มลัดการก๊อปปี้
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'p')) {
                e.preventDefault();
                alert('ไม่อนุญาตให้ก๊อปปี้ข้อมูล "พชร ข่าวขายทอดตลาด เจ้าเดียวต้นฉบับ"');
            }
        });
    </script>
</head>

<body>
    <div class="container">
        <table>
            <colgroup>
                <col style="width: 45px;"> <!-- Row Headers (1, 2, 3) -->
                <? for (let c = 0; c < colWidths.length; c++) { ?>
                <col style="width: <?= colWidths[c] ?>px;">
                <? } ?>
            </colgroup>
            <thead>
                <tr>
                    <th></th> <!-- Corner -->
                    <? 
                    const colLabels = ['A', 'B', 'C', 'D', 'E'];
                    for (let c = 0; c < colWidths.length; c++) { ?>
                    <th>
                        <?= colLabels[c] ?>
                    </th>
                    <? } ?>
                </tr>
            </thead>
            <tbody>
                <? for (let r = 0; r < data.length; r++) { ?>
                <tr style="height: <?= rowHeights[r] ?>px;">
                    <!-- Row Index Sidebar -->
                    <td class="sheet-cell"
                        style="background-color: #f8f9fa; color: #444; text-align: center; border: 1px solid #c0c0c0; font-size: 11px;">
                        <?= r + 1 ?>
                    </td>
                    <? for (let c = 0; c < data[r].length; c++) { 
                    let cellStyle = `
                        background-color: ${backgrounds[r][c]};
                        color: ${fontColors[r][c]};
                        font-weight: ${fontWeights[r][c] === 'bold' ? '700' : '400'};
                        font-size: ${fontSizes[r][c]}pt;
                    `;
                    
                    let content = data[r][c];
                    let richText = richTexts[r][c];
                    let link = (typeof richText.getLinkUrl === 'function') ? richText.getLinkUrl() : richText.linkUrl;

                    // การระนาบเนื้อหา (Align)
                    let align = (c === 0 || backgrounds[r][c] === '#eeeeee') ? 'center' : 'left';
                    // กรณี Title หรือ Header แถวบนๆ
                    if (r < 2) align = (c === 0 && r === 1) ? 'center' : 'left';
                    if (data[r][c].toString().startsWith('  ')) align = 'left'; 
                ?>
                    <td class="sheet-cell" style="<?= cellStyle ?> text-align: <?= align ?>;">
                        <? if (link) { ?>
                        <a href="<?= link ?>" target="_blank">
                            <?= content ?>
                        </a>
                        <? } else { ?>
                        <?= content ?>
                        <? } ?>
                    </td>
                    <? } ?>
                </tr>
                <? } ?>
            </tbody>
        </table>
    </div>
    <div id="overlay"></div>
</body>

</html>
